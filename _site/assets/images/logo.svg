<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0051BA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- City skyline -->
  <rect x="10" y="35" width="15" height="20" fill="url(#grad1)" opacity="0.8"/>
  <rect x="30" y="25" width="15" height="30" fill="url(#grad1)" opacity="0.9"/>
  <rect x="50" y="30" width="12" height="25" fill="url(#grad1)" opacity="0.7"/>
  
  <!-- Sun/climate element -->
  <circle cx="75" cy="20" r="12" fill="#00D4FF" opacity="0.3"/>
  <circle cx="75" cy="20" r="8" fill="#0051BA" opacity="0.5"/>
  
  <!-- Text -->
  <text x="95" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0051BA">Urban</text>
  <text x="95" y="42" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0051BA">Climate</text>
</svg>
