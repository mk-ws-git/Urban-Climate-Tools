# Jekyll configuration for Urban Climate Tools
# Add this to the Urban-Climate-Tools repository root

title: Urban Climate Adaptation Tools
description: Free, open-source tools for building climate-resilient cities
url: "https://mk-ws-git.github.io/Urban-Climate-Tools"
baseurl: ""

# Theme - GitHub Pages uses remote_theme
remote_theme: pages-themes/minimal@v0.2.0

# Plugins supported by GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections - temporarily disabled for GitHub Pages compatibility
# collections:
#   tools:
#     output: true
#     permalink: /tool/:title/
#   case_studies:
#     output: true
#     permalink: /case-study/:title/

# Default frontmatter - temporarily disabled
# defaults:
#   - scope:
#     path: "_tools"
#   values:
#     layout: tool
# - scope:
#     path: "_case_studies"
#   values:
#     layout: case-study

# Defaults
defaults:
  - scope:
      path: "_tools"
      type: tools
    values:
      layout: tool
  - scope:
      path: "_case_studies"
      type: case_studies
    values:
      layout: case-study

# Site configuration
highlighter: rouge
markdown: kramdown
sass:
  style: compressed
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Build settings
incremental: true
safe: true

# SEO
twitter_username: "@climatetools"
github_username: "mk-ws-git"
social:
  name: Urban Climate Tools
  links:
    - https://github.com/mk-ws-git/Urban-Climate-Tools
    - https://twitter.com/climatetools
