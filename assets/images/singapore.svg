<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1ba3c9"/>
      <stop offset="100%" stop-color="#2e7de0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Marina Bay Sands style building -->
  <rect x="340" y="150" width="30" height="200" fill="#EEEDFE" opacity="0.9"/>
  <rect x="385" y="150" width="30" height="200" fill="#EEEDFE" opacity="0.9"/>
  <rect x="430" y="150" width="30" height="200" fill="#EEEDFE" opacity="0.9"/>
  <rect x="310" y="125" width="220" height="30" fill="#AFA9EC" opacity="0.95"/>
  <!-- Other buildings -->
  <rect x="50"  y="180" width="55"  height="170" fill="#3C3489" opacity="0.8"/>
  <rect x="120" y="150" width="65"  height="200" fill="#3C3489" opacity="0.85"/>
  <rect x="200" y="170" width="55"  height="180" fill="#1ba3c9" opacity="0.7"/>
  <rect x="600" y="160" width="70"  height="190" fill="#3C3489" opacity="0.85"/>
  <rect x="690" y="145" width="60"  height="205" fill="#3C3489" opacity="0.8"/>
  <!-- Vertical green on buildings -->
  <rect x="120" y="150" width="10" height="200" fill="#3aad5c" opacity="0.7"/>
  <rect x="600" y="160" width="10" height="190" fill="#3aad5c" opacity="0.7"/>
  <!-- Water -->
  <rect y="350" width="800" height="100" fill="#1ba3c9" opacity="0.6"/>
  <path d="M0 370 Q200 360 400 370 Q600 380 800 365" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="400" y="418" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="rgba(255,255,255,0.9)">Singapore</text>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">Sustainable City &amp; Climate Resilience</text>
</svg>