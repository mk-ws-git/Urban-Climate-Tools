<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <linearGradient id="thames" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2e7de0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Big Ben / tower -->
  <rect x="360" y="100" width="40" height="250" fill="#444" opacity="0.9"/>
  <rect x="350" y="90" width="60" height="20" fill="#333" opacity="0.9"/>
  <rect x="355" y="70" width="50" height="25" fill="#555" opacity="0.9"/>
  <polygon points="355,70 380,40 405,70" fill="#444" opacity="0.9"/>
  <!-- Other London buildings -->
  <rect x="50"  y="180" width="60"  height="170" fill="#444" opacity="0.85"/>
  <rect x="125" y="155" width="75"  height="195" fill="#555" opacity="0.85"/>
  <rect x="215" y="170" width="55"  height="180" fill="#333" opacity="0.85"/>
  <rect x="285" y="160" width="60"  height="190" fill="#444" opacity="0.85"/>
  <rect x="435" y="165" width="65"  height="185" fill="#555" opacity="0.85"/>
  <rect x="515" y="175" width="60"  height="175" fill="#333" opacity="0.85"/>
  <rect x="590" y="155" width="75"  height="195" fill="#444" opacity="0.85"/>
  <rect x="680" y="175" width="60"  height="175" fill="#555" opacity="0.85"/>
  <!-- Shard style building -->
  <polygon points="480,50 500,350 530,350 510,50" fill="#7f8c8d" opacity="0.7"/>
  <!-- Thames river -->
  <rect y="350" width="800" height="100" fill="url(#thames)" opacity="0.85"/>
  <!-- Thames Embankment green -->
  <rect y="340" width="800" height="12" fill="#1D9E75" opacity="0.7"/>
  <path d="M0 365 Q200 355 400 365 Q600 375 800 360" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="400" y="415" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="rgba(255,255,255,0.9)">London, United Kingdom</text>
  <text x="400" y="438" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">Heat Risk Strategy &amp; Cool Spaces</text>
</svg>