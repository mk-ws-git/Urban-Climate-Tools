<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7de0"/>
      <stop offset="100%" stop-color="#1ba3c9"/>
    </linearGradient>
    <linearGradient id="flood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7de0"/>
      <stop offset="100%" stop-color="#0C447C"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Tropical skyline -->
  <rect x="50"  y="180" width="55"  height="170" fill="#0C447C" opacity="0.9"/>
  <rect x="120" y="155" width="70"  height="195" fill="#085041" opacity="0.85"/>
  <rect x="210" y="165" width="60"  height="185" fill="#0C447C" opacity="0.9"/>
  <rect x="285" y="140" width="85"  height="210" fill="#085041" opacity="0.85"/>
  <rect x="390" y="160" width="65"  height="190" fill="#0C447C" opacity="0.9"/>
  <rect x="475" y="150" width="75"  height="200" fill="#085041" opacity="0.85"/>
  <rect x="570" y="165" width="65"  height="185" fill="#0C447C" opacity="0.9"/>
  <rect x="650" y="145" width="75"  height="205" fill="#085041" opacity="0.85"/>
  <rect x="740" y="175" width="50"  height="175" fill="#0C447C" opacity="0.9"/>
  <!-- Sea wall -->
  <rect y="340" width="800" height="20" fill="#7f8c8d" opacity="0.9"/>
  <!-- Flood water -->
  <rect y="360" width="800" height="90" fill="url(#flood)" opacity="0.85"/>
  <!-- Mangroves -->
  <ellipse cx="100" cy="345" rx="25" ry="35" fill="#1D9E75" opacity="0.9"/>
  <ellipse cx="300" cy="345" rx="28" ry="38" fill="#085041" opacity="0.9"/>
  <ellipse cx="500" cy="345" rx="25" ry="35" fill="#1D9E75" opacity="0.9"/>
  <ellipse cx="700" cy="345" rx="28" ry="38" fill="#085041" opacity="0.9"/>
  <!-- Wave lines -->
  <path d="M0 380 Q200 370 400 380 Q600 390 800 375" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="400" y="415" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="rgba(255,255,255,0.9)">Jakarta, Indonesia</text>
  <text x="400" y="438" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">Flood Resilience &amp; Nature-Based Solutions</text>
</svg>