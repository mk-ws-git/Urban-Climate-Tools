<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Eiffel tower silhouette -->
  <polygon points="370,80 395,320 405,320 430,80" fill="#085041" opacity="0.7"/>
  <rect x="355" y="180" width="90" height="8" fill="#085041" opacity="0.7"/>
  <rect x="340" y="240" width="120" height="8" fill="#085041" opacity="0.7"/>
  <rect x="360" y="75" width="80" height="5" fill="#085041" opacity="0.7"/>
  <!-- Trees along boulevard -->
  <ellipse cx="50"  cy="280" rx="45" ry="55" fill="#085041" opacity="0.9"/>
  <ellipse cx="150" cy="270" rx="50" ry="60" fill="#0F6E56" opacity="0.9"/>
  <ellipse cx="260" cy="275" rx="45" ry="55" fill="#085041" opacity="0.9"/>
  <ellipse cx="540" cy="275" rx="45" ry="55" fill="#0F6E56" opacity="0.9"/>
  <ellipse cx="650" cy="270" rx="50" ry="60" fill="#085041" opacity="0.9"/>
  <ellipse cx="750" cy="280" rx="45" ry="55" fill="#0F6E56" opacity="0.9"/>
  <!-- Ground / boulevard -->
  <rect y="320" width="800" height="130" fill="#0F6E56" opacity="0.7"/>
  <!-- Boulevard path -->
  <rect x="200" y="320" width="400" height="130" fill="#1a6e35" opacity="0.5"/>
  <text x="400" y="415" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="rgba(255,255,255,0.9)">Paris, France</text>
  <text x="400" y="438" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">Urban Forestry &amp; Green Spaces</text>
</svg>