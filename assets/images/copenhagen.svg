<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7de0"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="90" ry="35" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="220" cy="70" rx="70" ry="30" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="600" cy="90" rx="80" ry="30" fill="rgba(255,255,255,0.6)"/>
  <!-- Copenhagen buildings with colourful facades -->
  <rect x="40"  y="185" width="55"  height="165" fill="#e05c2e" opacity="0.9"/>
  <rect x="110" y="170" width="60"  height="180" fill="#EF9F27" opacity="0.9"/>
  <rect x="185" y="180" width="55"  height="170" fill="#1D9E75" opacity="0.9"/>
  <rect x="255" y="155" width="65"  height="195" fill="#2e7de0" opacity="0.9"/>
  <rect x="335" y="170" width="60"  height="180" fill="#e05c2e" opacity="0.9"/>
  <rect x="410" y="160" width="65"  height="190" fill="#EF9F27" opacity="0.9"/>
  <rect x="490" y="175" width="55"  height="175" fill="#1D9E75" opacity="0.9"/>
  <rect x="560" y="165" width="65"  height="185" fill="#2e7de0" opacity="0.9"/>
  <rect x="640" y="180" width="60"  height="170" fill="#e05c2e" opacity="0.9"/>
  <rect x="715" y="170" width="65"  height="180" fill="#EF9F27" opacity="0.9"/>
  <!-- Cycle lane -->
  <rect y="350" width="800" height="100" fill="#0C447C" opacity="0.8"/>
  <rect x="0" y="365" width="800" height="4" fill="#EF9F27" opacity="0.9"/>
  <!-- Bicycle silhouette -->
  <circle cx="380" cy="385" r="18" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
  <circle cx="430" cy="385" r="18" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
  <line x1="380" y1="385" x2="430" y2="385" stroke="rgba(255,255,255,0.8)" stroke-width="3"/>
  <text x="400" y="432" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="rgba(255,255,255,0.9)">Copenhagen, Denmark</text>
  <text x="400" y="448" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">Cycling &amp; Carbon Neutral Strategy</text>
</svg>