<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <defs>
    <style>
      .wordmark { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
      .tagline  { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 0.02em; }
    </style>
  </defs>

  <!-- ─── LIGHT LOCKUP (top) ─── -->
  <g transform="translate(10, 10)">
    <!-- mark background -->
    <rect width="60" height="60" rx="13" fill="#E1F5EE"/>
    <!-- buildings -->
    <rect x="8"  y="32" width="5" height="20" fill="#1D9E75" opacity="0.22"/>
    <rect x="14" y="20" width="5" height="32" fill="#1D9E75" opacity="0.22"/>
    <rect x="20" y="26" width="5" height="26" fill="#1D9E75" opacity="0.22"/>
    <rect x="26" y="12" width="6" height="40" fill="#1D9E75" opacity="0.28"/>
    <rect x="33" y="22" width="5" height="30" fill="#1D9E75" opacity="0.22"/>
    <rect x="39" y="18" width="5" height="34" fill="#1D9E75" opacity="0.22"/>
    <rect x="45" y="28" width="6" height="24" fill="#1D9E75" opacity="0.18"/>
    <!-- W2 wave -->
    <path d="M6 44 C10 44 13 36 18 34 C23 32 25 38 30 36 C35 34 38 22 43 20 C48 18 51 24 54 22" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="43" cy="20" r="2.5" fill="#1D9E75"/>
    <!-- baseline -->
    <line x1="6" y1="52" x2="54" y2="52" stroke="#9FE1CB" stroke-width="1" stroke-linecap="round"/>
    <!-- wordmark -->
    <text x="72" y="36" class="wordmark" fill="#1a1a1a">Urban <tspan fill="#1D9E75">Climate</tspan> Tools</text>
    <text x="72" y="52" class="tagline" fill="#888">Open tools for resilient urban futures</text>
  </g>

  <!-- ─── DARK LOCKUP (bottom) ─── -->
  <g transform="translate(10, 82)">
    <rect width="60" height="60" rx="13" fill="#085041"/>
    <rect x="8"  y="32" width="5" height="20" fill="#5DCAA5" opacity="0.28"/>
    <rect x="14" y="20" width="5" height="32" fill="#5DCAA5" opacity="0.28"/>
    <rect x="20" y="26" width="5" height="26" fill="#5DCAA5" opacity="0.28"/>
    <rect x="26" y="12" width="6" height="40" fill="#5DCAA5" opacity="0.35"/>
    <rect x="33" y="22" width="5" height="30" fill="#5DCAA5" opacity="0.28"/>
    <rect x="39" y="18" width="5" height="34" fill="#5DCAA5" opacity="0.28"/>
    <rect x="45" y="28" width="6" height="24" fill="#5DCAA5" opacity="0.22"/>
    <path d="M6 44 C10 44 13 36 18 34 C23 32 25 38 30 36 C35 34 38 22 43 20 C48 18 51 24 54 22" stroke="#5DCAA5" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="43" cy="20" r="2.5" fill="#5DCAA5"/>
    <line x1="6" y1="52" x2="54" y2="52" stroke="#085041" stroke-width="1" stroke-linecap="round"/>
    <text x="72" y="36" class="wordmark" fill="#E1F5EE">Urban <tspan fill="#5DCAA5">Climate</tspan> Tools</text>
    <text x="72" y="52" class="tagline" fill="#5DCAA5">Open tools for resilient urban futures</text>
  </g>
</svg>
