---
layout: default
---

<section class="section">
    <div class="container">
        <div class="section__header">
            <h1 class="section__title">{{ page.category | capitalize }} Tools</h1>
        </div>

        <div class="content">
            <div class="content__intro">
                <p>{{ page.description }}</p>
            </div>

            <div class="filters">
                <h3 class="filters__title">Filter Tools</h3>
                <div class="filter-group">
                    <label class="filter-option">
                        <input type="checkbox" class="filter-cost" value="free">
                        <span class="filter-option__label">Free</span>
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" class="filter-cost" value="freemium">
                        <span class="filter-option__label">Freemium</span>
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" class="filter-cost" value="paid">
                        <span class="filter-option__label">Paid</span>
                    </label>
                </div>

                <div class="filter-group">
                    <label class="filter-option">
                        <input type="checkbox" class="filter-skill" value="beginner">
                        <span class="filter-option__label">Beginner</span>
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" class="filter-skill" value="intermediate">
                        <span class="filter-option__label">Intermediate</span>
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" class="filter-skill" value="advanced">
                        <span class="filter-option__label">Advanced</span>
                    </label>
                </div>

                <div class="filter-group">
                    <label class="filter-option">
                        <input type="checkbox" class="filter-coverage" value="global">
                        <span class="filter-option__label">Global</span>
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" class="filter-coverage" value="us">
                        <span class="filter-option__label">US</span>
                    </label>
                    <label class="filter-option">
                        <input type="checkbox" class="filter-coverage" value="regional">
                        <span class="filter-option__label">Regional</span>
                    </label>
                </div>
            </div>

            <div class="tool-grid">
                {% for tool in site.tools %}
                    {% if tool.categories contains page.category %}
                        {% include tool-card.html tool=tool %}
                    {% endif %}
                {% endfor %}
            </div>
        </div>
    </div>
</section>
