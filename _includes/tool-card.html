<div class="tool-card" data-cost="{{ tool.cost }}" data-skill="{{ tool.skillLevel }}" data-coverage="{{ tool.coverage | join: ',' }}">
    <div class="card-header">
        <div class="card-icon">
            <img src="{{ tool.icon | relative_url }}" alt="{{ tool.name }}" class="icon-md">
        </div>
        <div class="tool-card__tags">
            {% for category in tool.categories %}
                <span class="tag tag--category">{{ category }}</span>
            {% endfor %}
        </div>
    </div>

    <div class="card-body">
        <h3><a href="{{ tool.url }}">{{ tool.name }}</a></h3>
        <p class="developer">{{ tool.developer }}</p>
        <p class="description">{{ tool.description | truncatewords: 20 }}</p>

        <div class="card-meta">
            <span class="meta-item">
                <span class="label">Cost:</span>
                <span class="value">{{ tool.cost }}</span>
            </span>
            <span class="meta-item">
                <span class="label">Coverage:</span>
                <span class="value">{{ tool.coverage | join: ', ' }}</span>
            </span>
            <span class="meta-item">
                <span class="label">Skill:</span>
                <span class="value">{{ tool.skillLevel }}</span>
            </span>
        </div>
    </div>
    
    <div class="card-footer">
        <a href="{{ tool.url }}" class="btn btn-sm btn-primary">View Details →</a>
    </div>
</div>
